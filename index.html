<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Eleanorの計算ツール</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<h1>Eleanorの計算ツール</h1>
	<input type="text" id="usernameInput" placeholder="ニックネームを入力">
	<button onclick="greetUser()">決定する！</button>
	<h2 id="displayMessage"></h2>
	
	<input type="number" id="num1" placeholder="1つめの数字">

	<select id="symbol">
		<option value="+">+</option>
		<option value="-">-</option>
		<option value="*">×</option>
		<option value="/">÷</option>
	</select>
	
	<input type="number" id="num2" placeholder="2つめの数字">
	
	<button onclick="Calculator()">計算する！</button>
	
	<p id="result"></p>
	
	<script src="script.js"></script>
</body>
</html>
